<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Search Room - CheckinX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#f5f9ff; color:#1f3246; }
        .navbar { display:flex; justify-content:space-between; align-items:center; padding:18px 50px; background:#fff; box-shadow:0 2px 10px rgba(0,0,0,.06); position:sticky; top:0; z-index:100; }
        .logo { font-size:26px; font-weight:700; color:#007bff; }
        .nav-links { display:flex; align-items:center; gap:16px; }
        .nav-links a { color:#394d63; text-decoration:none; font-weight:500; font-size:14px; }
        .nav-links a:hover { color:#007bff; }
        .btn-login { background:#007bff; color:#fff; border:0; border-radius:10px; padding:8px 18px; cursor:pointer; font-weight:600; }
        .container { display:grid; grid-template-columns:280px 1fr; gap:25px; padding:30px 40px 40px; min-height:calc(100vh - 80px); }
        .sidebar { background:#fff; border-radius:18px; padding:20px; box-shadow:0 10px 34px rgba(0,0,0,.08); position:sticky; top:95px; align-self:start; }
        .sidebar h2 { font-size:18px; margin-bottom:14px; color:#011f4b; }
        .slider-wrap { margin:20px 0; }
        .slider-value { font-size:14px; color:#607b9c; margin-bottom:8px; }
        .range { width:100%; }
        .btn-apply { width:100%; margin-top:16px; border:0; border-radius:10px; background:#0f215f; color:#fff; padding:12px 0; font-size:15px; cursor:pointer; font-weight:600; }
        .content { display:flex; flex-direction:column; gap:18px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .topbar h1 { font-size:28px; color:#020f26; }
        .result-info { font-size:14px; color:#62718a; }
        .room-grid { display:grid; grid-template-columns:repeat(3,minmax(260px,1fr)); gap:20px; }
        .room-card { background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 12px 28px rgba(0,0,0,.08); transition:transform .25s ease, box-shadow .25s ease; cursor:pointer; display:flex; flex-direction:column; }
        .room-card:hover { transform:translateY(-4px); box-shadow:0 14px 30px rgba(0,0,0,.12); }
        .room-cover { width:100%; height:200px; object-fit:cover; }
        .room-body { padding:16px 14px 18px; display:flex; flex-direction:column; gap:9px; }
        .room-title { font-size:20px; font-weight:700; color:#0f235c; }
        .room-location { font-size:13px; color:#5d728f; }
        .room-price { font-size:18px; font-weight:700; color:#007bff; }
        .rating { background:#0094ff; color:#fff; border-radius:11px; padding:4px 10px; font-weight:700; font-size:12px; width:max-content; }
        .loading, .empty { text-align:center; color:#6c7a91; padding:40px 0; font-size:16px; }
        .footer { background:#0a1b3c; color:#87a0c8; padding:36px 40px; margin-top:12px; }
        .footer-container { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:22px; }
        .footer h3 { color:#fff; margin-bottom:10px; font-size:15px; }
        .footer a { color:#87a0c8; text-decoration:none; line-height:1.8; font-size:13px; }
        .footer-bottom { text-align:center; margin-top:14px; font-size:13px; color:#aec1e6; }
        @media (max-width:1120px) { .container { grid-template-columns:1fr; } .sidebar { position:relative; top:auto; } .room-grid { grid-template-columns:repeat(2,minmax(250px,1fr)); } }
        @media (max-width:780px) { .navbar { padding:14px 18px; } .container { padding:18px; } .room-grid { grid-template-columns:1fr; } .topbar { flex-direction:column; align-items:flex-start; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">CheckinX</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="#">Rooms</a>
            <a href="#">Booking</a>
            <a href="#">Support</a>
        </div>
        <button id="loginBtn" class="btn-login" onclick="handleLoginClick()">Login</button>
    </div>

    <div class="container">
        <aside class="sidebar">
            <h2>Bộ lọc giá</h2>
            <div class="slider-wrap">
                <div class="slider-value">Từ <span id="minLabel">0</span> VNĐ đến <span id="maxLabel">1000+</span> VNĐ</div>
                <input id="priceRange" class="range" type="range" min="0" max="1000000" step="50000" value="1000000" oninput="updateSliderLabel()">
            </div>
            <button class="btn-apply" onclick="applyFilter()">Áp dụng</button>
        </aside>

        <main class="content">
            <div class="topbar">
                <h1>Rooms matching your price</h1>
                <div class="result-info" id="resultInfo"></div>
            </div>

            <div id="roomList" class="room-grid">
                <div class="loading">Đang tải phòng...</div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div>
                <h3>CheckinX</h3>
                <p>Nền tảng đặt phòng hiện đại.</p>
            </div>
            <div>
                <h3>Về chúng tôi</h3>
                <a href="#">Giới thiệu</a>
                <a href="#">Tin tức</a>
            </div>
            <div>
                <h3>Hỗ trợ</h3>
                <a href="#">FAQ</a>
                <a href="#">Liên hệ</a>
            </div>
            <div>
                <h3>Liên hệ</h3>
                <p>📍 Việt Nam</p>
                <p>📞 1900 6789</p>
            </div>
        </div>
        <div class="footer-bottom">© 2026 CheckinX</div>
    </footer>

    <script>
        function goLogin() { window.location.href = 'login.html'; }

        function formatPrice(price) { return Number(price || 0).toLocaleString('vi-VN'); }
        function getImgByName(name) { if (!name) return 'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=1200&q=80'; const n = name.trim(); return `img/${n}.png`; }

        function getQueryParams() {
            const p = new URLSearchParams(window.location.search);
            return { minPrice: p.get('minPrice') || '0', maxPrice: p.get('maxPrice') || '1000000' };
        }

        function updateSliderLabel() {
            const range = document.getElementById('priceRange');
            const value = Number(range.value);
            document.getElementById('minLabel').textContent = '0';
            document.getElementById('maxLabel').textContent = value >= 1000000 ? '1000+' : formatPrice(value);
        }

        async function loadRooms(minPrice, maxPrice) {
            const list = document.getElementById('roomList');
            const infoLayer = document.getElementById('resultInfo');
            list.innerHTML = '<div class="loading">Đang tải phòng...</div>';
            infoLayer.textContent = `Giá: ${formatPrice(minPrice)}đ - ${maxPrice >= 1000000000 ? '1000+' : formatPrice(maxPrice)}đ`;

            try {
                const res = await fetch(`http://localhost:8080/hotel/room-types/search-by-day-price?minPrice=${minPrice}&maxPrice=${maxPrice}`);
                if (!res.ok) throw new Error('API lỗi');
                const data = await res.json();
                const rooms = (data.content || []).filter(r => r.status === 1);

                if (!rooms.length) {
                    list.innerHTML = '<div class="empty">Không tìm thấy phòng phù hợp.</div>';
                    return;
                }

                list.innerHTML = '';
                rooms.forEach(room => {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.onclick = () => window.location.href = `room-type-details.html?id=${room.id}`;
                    const imgSrc = getImgByName(room.name);
                    const rating = room.rating || 4.8;
                    card.innerHTML = `
                        <img class="room-cover" src="${imgSrc}" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=1200&q=80'" alt="${room.name}">
                        <div class="room-body">
                            <div class="rating">${rating.toFixed(1)}</div>
                            <div class="room-title">${room.name}</div>
                            <div class="room-location">Marina District, SF</div>
                            <div class="room-price">${formatPrice(room.priceDay)} VNĐ / night</div>
                        </div>
                    `;
                    list.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                list.innerHTML = '<div class="empty">Không thể tải phòng, vui lòng thử lại.</div>';
            }
        }

        function handleLoginClick() {
            const username = localStorage.getItem('checkinXUser');
            if (username) {
                alert(`Xin chào ${username}!`);
            } else {
                window.location.href = 'login.html';
            }
        }

        function updateLoginButton() {
            const btn = document.getElementById('loginBtn');
            const username = localStorage.getItem('checkinXUser');
            if (username) {
                btn.textContent = username;
                btn.onclick = () => alert(`Đã đăng nhập là ${username}`);
            } else {
                btn.textContent = 'Login';
                btn.onclick = handleLoginClick;
            }
        }

        function applyFilter() {
            const range = document.getElementById('priceRange').value;
            const minPrice = 0;
            const maxPrice = Number(range);
            window.location.href = `search-room-type.html?minPrice=${minPrice}&maxPrice=${maxPrice}`;
        }

        window.onload = () => {
            updateLoginButton();
            const { minPrice, maxPrice } = getQueryParams();
            const priceElem = document.getElementById('priceRange');
            const parsedMax = Number(maxPrice) || 1000000;
            priceElem.value = parsedMax;
            updateSliderLabel();
            loadRooms(minPrice, maxPrice);
        };
    </script>
</body>
</html>
