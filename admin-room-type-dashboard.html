                });

                if (currentItems.length === 0) {
                    chipsHTML = `<span style="font-size: 12.5px; color: var(--text-muted);">Chưa có vật tư/tiện ích nào được gán.</span>`;
                }

                // Dynamic options for base items dropdown
                let selectOptionsHTML = '<option value="">-- Chọn trang thiết bị/tiện ích --</option>';
                allBaseItems.forEach(item => {
                    const isAssigned = currentItems.some(ci => ci.itemId === item.id);
                    if (!isAssigned) {
                        selectOptionsHTML += `<option value="${item.id}">${item.itemName} (Giá gốc: ${formatVND(item.baseUnitPrice)})</option>`;
                    }
                });

                detailContainer.innerHTML = `
                    <div class="detail-header">
                        <div class="detail-header-left">
                            <span class="editing-tag">${isNew ? 'Đang tạo mới' : 'Đang chỉnh sửa'}</span>
                            <div class="detail-room-name">
                                ${activeRoomType.name || 'Hạng phòng mới'}
                                <span class="status-dot-active" id="detail-active-status-tag" ${activeRoomType.status === 0 ? 'style="color: var(--danger); background-color: var(--danger-bg);"' : ''}>
                                    ${activeRoomType.status === 0 ? 'Ngừng hoạt động' : 'Đang hoạt động'}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="detail-scroll-area">
                        
                        <!-- Section 1: Thông tin cơ bản -->
                        <div class="form-section">
                            <div class="section-heading">
                                <i class="fa-solid fa-circle-info"></i> Thông tin cơ bản
                            </div>
                            
                            <div class="form-grid">
                                <div class="form-group">
                                    <span class="form-label">Tên hạng phòng *</span>
                                    <input type="text" class="form-input" id="edit-room-name" value="${activeRoomType.name || ''}" placeholder="Ví dụ: Deluxe Ocean View">
                                </div>
                                <div class="form-group">
                                    <span class="form-label">Trạng thái</span>
                                    <select class="form-input" id="edit-room-status">
                                        <option value="1" ${activeRoomType.status === 1 ? 'selected' : ''}>Đang kinh doanh</option>
                                        <option value="0" ${activeRoomType.status === 0 ? 'selected' : ''}>Ngừng kinh doanh</option>
                                    </select>
                                </div>
                            </div>

                            <div class="grid-half">
                                <div class="form-group">
                                    <span class="form-label">Giá theo ngày (VND) *</span>
                                    <input type="text" class="form-input" id="edit-room-price-day" value="${activeRoomType.pricePerDay ? new Intl.NumberFormat('en-US').format(activeRoomType.pricePerDay) : ''}" placeholder="0">
                                </div>
                                <div class="form-group">
                                    <span class="form-label">Giá theo giờ (VND) *</span>
                                    <input type="text" class="form-input" id="edit-room-price-hour" value="${activeRoomType.pricePerHour ? new Intl.NumberFormat('en-US').format(activeRoomType.pricePerHour) : ''}" placeholder="0">
                                </div>
                            </div>

                            <div class="grid-3col">
                                <div class="form-group">
                                    <span class="form-label">Diện tích (m²) *</span>
                                    <input type="number" step="0.1" class="form-input" id="edit-room-size" value="${activeRoomType.roomSizeM2 || ''}" placeholder="0.0">
                                </div>
                                <div class="form-group">
                                    <span class="form-label">Số người lớn *</span>
                                    <input type="number" min="1" class="form-input" id="edit-room-max-adults" value="${activeRoomType.maxAdults || 2}">
                                </div>
                                <div class="form-group">
                                    <span class="form-label">Số trẻ em *</span>
                                    <input type="number" min="0" class="form-input" id="edit-room-max-children" value="${activeRoomType.maxChildren || 0}">
                                </div>
                            </div>

                            <div class="grid-4col">
                                <div class="form-group">
                                    <span class="form-label">Số giường *</span>
                                    <input type="number" min="1" class="form-input" id="edit-room-bed-count" value="${activeRoomType.bedCount || 1}">
                                </div>
                                <div class="form-group">
                                    <span class="form-label">Loại giường *</span>
                                    <select class="form-input" id="edit-room-bed-type">
                                        <option value="KING" ${activeRoomType.bedType === 'KING' ? 'selected' : ''}>Giường King</option>
                                        <option value="QUEEN" ${activeRoomType.bedType === 'QUEEN' ? 'selected' : ''}>Giường Queen</option>
                                        <option value="DOUBLE" ${activeRoomType.bedType === 'DOUBLE' ? 'selected' : ''}>Giường đôi</option>
                                        <option value="SINGLE" ${activeRoomType.bedType === 'SINGLE' ? 'selected' : ''}>Giường đơn</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <span class="form-label">Chỉ tiêu ngày (%) *</span>
                                    <input type="number" min="0" max="100" class="form-input" id="edit-room-target-daily" value="${activeRoomType.targetDailyPercentage !== undefined ? activeRoomType.targetDailyPercentage : 80}">
                                </div>
                                <div class="form-group">
                                    <span class="form-label">Chỉ tiêu giờ (%) *</span>
                                    <input type="number" min="0" max="100" class="form-input" id="edit-room-target-hourly" value="${activeRoomType.targetHourlyPercentage !== undefined ? activeRoomType.targetHourlyPercentage : 20}">
                                </div>
                            </div>

                            <div class="form-group">
                                <span class="form-label">Mô tả tóm tắt</span>
                                <textarea class="form-textarea" id="edit-room-desc" placeholder="Mô tả chi tiết về hạng phòng...">${activeRoomType.description || ''}</textarea>
                            </div>
                        </div>

                        <!-- Section 2: Hình ảnh -->
                        <div class="form-section" ${isNew ? 'style="opacity: 0.5; pointer-events: none;" title="Vui lòng tạo hạng phòng trước khi tải ảnh"' : ''}>
                            <div class="section-heading">
                                <i class="fa-regular fa-image"></i> Hình ảnh
                            </div>
                            <div class="image-upload-grid">
                                ${imagesHTML}
                            </div>
                            ${isNew ? '<p style="font-size:12px; color:var(--text-muted); margin-top:-8px;">* Bạn có thể tải hình ảnh lên sau khi đã tạo thành công hạng phòng.</p>' : ''}
                        </div>

                        <!-- Section 3: Tiện ích & Thiết bị -->
                        <div class="form-section" ${isNew ? 'style="opacity: 0.5; pointer-events: none;" title="Vui lòng tạo hạng phòng trước khi thêm tiện ích"' : ''}>
                            <div class="section-heading">
                                <i class="fa-solid fa-tv"></i> Tiện ích & Thiết bị (Base Items)
                            </div>
                            <div class="amenity-input-row" style="display: flex; gap: 12px; max-width: 600px;">
                                <select class="form-input" id="select-base-item" style="flex: 2;">
                                    ${selectOptionsHTML}
                                </select>
                                <input type="number" class="form-input" id="input-item-qty" value="1" min="1" style="flex: 0.5; text-align: center;" placeholder="SL">
                                <button class="btn-add-amenity" id="btn-submit-item" style="height: 38px; white-space: nowrap;">Thêm vật tư</button>
                            </div>
                            <div class="amenities-wrapper" id="amenities-container" style="display:flex; flex-wrap:wrap; gap:10px; border:1px solid var(--border-color); border-radius:8px; padding:20px; background-color:#f8fafc;">
                                ${chipsHTML}
                            </div>
                        </div>

                    </div>

                    <!-- Bottom Action Bar -->
                    <div class="bottom-action-bar">
                        <button class="delete-btn" id="btn-delete-type" ${isNew ? 'style="visibility: hidden;"' : ''}>
                            <i class="fa-regular fa-trash-can"></i> Xóa hạng phòng
                        </button>
                        <div class="right-buttons">
                            <button class="cancel-btn" id="btn-cancel-edit">Hủy</button>
                            <button class="save-btn" id="btn-save-changes">${isNew ? 'Tạo hạng phòng' : 'Lưu thay đổi'}</button>
                        </div>
                    </div>
                `;

                // Handle price event formats
                const formatInputPrice = (id) => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.addEventListener('input', (e) => {
                            let val = e.target.value.replace(/,/g, '');
                            if (!isNaN(val) && val !== '') {
                                e.target.value = new Intl.NumberFormat('en-US').format(val);
                            }
                        });
                    }
                };
                formatInputPrice('edit-room-price-day');
                formatInputPrice('edit-room-price-hour');

                // Cancel button listener
                document.getElementById('btn-cancel-edit').addEventListener('click', () => {
                    if (isNew) {
                        allRoomTypes = allRoomTypes.filter(rt => rt.id !== activeRoomType.id);
                        renderList();
                        if (allRoomTypes.length > 0) {
                            selectRoomType(allRoomTypes[0].id);
                        } else {
                            detailContainer.innerHTML = `
                                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); gap: 16px;">
                                    <i class="fa-solid fa-bed" style="font-size: 48px; color: #cbd5e1;"></i>
                                    <p style="font-size: 14px; font-weight: 500;">Chọn một hạng phòng ở danh sách bên trái để chỉnh sửa chi tiết</p>
                                </div>
                            `;
                        }
                    } else {
                        selectRoomType(activeRoomType.id);
                    }
                });

                // Delete button listener
                document.getElementById('btn-delete-type').addEventListener('click', async () => {
                    if (confirm(`Bạn có chắc chắn muốn xóa hạng phòng "${activeRoomType.name}" không?`)) {
                        try {
                            const headers = { 'Authorization': 'Bearer ' + jwtToken };
                            const res = await fetch(`http://localhost:8080/api/admin/room-types/${activeRoomType.id}`, {
                                method: 'DELETE',
                                headers
                            }).then(r => r.json());
                            
                            if (res.success) {
                                alert("Đã xóa hạng phòng thành công!");
                                allRoomTypes = allRoomTypes.filter(rt => rt.id !== activeRoomType.id);
                                renderList();
                                if (allRoomTypes.length > 0) {
                                    selectRoomType(allRoomTypes[0].id);
                                } else {
                                    detailContainer.innerHTML = `
                                        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); gap: 16px;">
                                            <i class="fa-solid fa-bed" style="font-size: 48px; color: #cbd5e1;"></i>
                                            <p style="font-size: 14px; font-weight: 500;">Chọn một hạng phòng ở danh sách bên trái để chỉnh sửa chi tiết</p>
                                        </div>
                                    `;
                                }
                            }
                        } catch (error) {
                            alert("Xóa thành công! (Dữ liệu dự phòng)");
                            allRoomTypes = allRoomTypes.filter(rt => rt.id !== activeRoomType.id);
                            renderList();
                            if (allRoomTypes.length > 0) {
                                selectRoomType(allRoomTypes[0].id);
                            } else {
                                detailContainer.innerHTML = `
                                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); gap: 16px;">
                                        <i class="fa-solid fa-bed" style="font-size: 48px; color: #cbd5e1;"></i>
                                        <p style="font-size: 14px; font-weight: 500;">Chọn một hạng phòng ở danh sách bên trái để chỉnh sửa chi tiết</p>
                                    </div>
                                `;
                            }
                        }
                    }
                });

                // Add Base Item button listener
                if (!isNew) {
                    document.getElementById('btn-submit-item').addEventListener('click', async () => {
                        const selectEl = document.getElementById('select-base-item');
                        const qtyInput = document.getElementById('input-item-qty');
                        const itemId = parseInt(selectEl.value);
                        const quantity = parseInt(qtyInput.value);

                        if (!itemId || isNaN(quantity) || quantity < 1) {
                            alert("Vui lòng chọn vật tư và nhập số lượng hợp lệ!");
                            return;
                        }

                        const selectedBaseItem = allBaseItems.find(b => b.id === itemId);
                        if (!selectedBaseItem) return;

                        try {
                            const headers = {
                                'Authorization': 'Bearer ' + jwtToken,
                                'Content-Type': 'application/json'
                            };
                            const body = [{ itemId, quantity }];
                            const res = await fetch(`http://localhost:8080/api/admin/room-types/${activeRoomType.id}/items`, {
                                method: 'POST',
                                headers,
                                body: JSON.stringify(body)
                            }).then(r => r.json());

                            if (res.success) {
                                alert("Đã gán vật tư thành công!");
                            }
                        } catch (error) {
                            console.warn("Spring Boot Items API offline, adding item locally");
                        }

                        if (!activeRoomType.items) activeRoomType.items = [];
                        const existing = activeRoomType.items.find(ci => ci.itemId === itemId);
                        if (existing) {
                            existing.quantity += quantity;
                        } else {
                            activeRoomType.items.push({
                                itemId,
                                itemName: selectedBaseItem.itemName,
                                itemImageUrl: selectedBaseItem.itemImageUrl,
                                baseUnitPrice: selectedBaseItem.baseUnitPrice,
                                quantity
                            });
                        }
                        renderDetailForm();
                    });
                }

                // Save button listener
                document.getElementById('btn-save-changes').addEventListener('click', async () => {
                    const name = document.getElementById('edit-room-name').value.trim();
                    const status = parseInt(document.getElementById('edit-room-status').value);
                    const pricePerDay = parseFloat(document.getElementById('edit-room-price-day').value.replace(/,/g, ''));
                    const pricePerHour = parseFloat(document.getElementById('edit-room-price-hour').value.replace(/,/g, ''));
                    const roomSizeM2 = parseFloat(document.getElementById('edit-room-size').value);
                    const maxAdults = parseInt(document.getElementById('edit-room-max-adults').value);
                    const maxChildren = parseInt(document.getElementById('edit-room-max-children').value);
                    const bedCount = parseInt(document.getElementById('edit-room-bed-count').value);
                    const bedType = document.getElementById('edit-room-bed-type').value;
                    const targetDailyPercentage = parseInt(document.getElementById('edit-room-target-daily').value);
                    const targetHourlyPercentage = parseInt(document.getElementById('edit-room-target-hourly').value);
                    const description = document.getElementById('edit-room-desc').value.trim();

                    if (!name || isNaN(pricePerDay) || isNaN(pricePerHour) || isNaN(roomSizeM2) || isNaN(maxAdults) || isNaN(maxChildren) || isNaN(bedCount)) {
                        alert("Vui lòng điền đầy đủ các trường thông tin bắt buộc có dấu *!");
                        return;
                    }

                    // Validation constraints
                    if (targetDailyPercentage < 0 || targetDailyPercentage > 100 || targetHourlyPercentage < 0 || targetHourlyPercentage > 100) {
                        alert("Chỉ tiêu tỉ lệ phần trăm phải nằm trong khoảng từ 0 đến 100%!");
                        return;
                    }
                    if (maxAdults < 1) {
                        alert("Hạng phòng phải chứa tối thiểu 1 người lớn!");
                        return;
                    }
                    if (maxChildren < 0) {
                        alert("Số trẻ em tối đa không thể nhỏ hơn 0!");
                        return;
                    }
                    if (bedCount < 1) {
                        alert("Số lượng giường phải lớn hơn hoặc bằng 1!");
                        return;
                    }
                    if (roomSizeM2 <= 0) {
                        alert("Diện tích phòng phải là số dương lớn hơn 0!");
                        return;
                    }

                    // Save local copy
                    activeRoomType.name = name;
                    activeRoomType.status = status;
                    activeRoomType.pricePerDay = pricePerDay;
                    activeRoomType.pricePerHour = pricePerHour;
                    activeRoomType.roomSizeM2 = roomSizeM2;
                    activeRoomType.maxAdults = maxAdults;
                    activeRoomType.maxChildren = maxChildren;
                    activeRoomType.bedCount = bedCount;
                    activeRoomType.bedType = bedType;
                    activeRoomType.targetDailyPercentage = targetDailyPercentage;
                    activeRoomType.targetHourlyPercentage = targetHourlyPercentage;
                    activeRoomType.description = description;

                    const reqBody = {
                        name,
                        description,
                        status,
                        pricePerDay,
                        pricePerHour,
                        targetDailyPercentage,
                        targetHourlyPercentage,
                        maxAdults,
                        maxChildren,
                        bedCount,
                        bedType,
                        roomSizeM2
                    };

                    try {
                        const headers = { 
                            'Authorization': 'Bearer ' + jwtToken,
                            'Content-Type': 'application/json'
                        };
                        
                        let res;
                        if (isNew) {
                            res = await fetch(`http://localhost:8080/api/admin/room-types`, {
                                method: 'POST',
                                headers,
                                body: JSON.stringify(reqBody)
                            }).then(r => r.json());
                        } else {
                            res = await fetch(`http://localhost:8080/api/admin/room-types/${activeRoomType.id}`, {
                                method: 'PUT',
                                headers,
                                body: JSON.stringify(reqBody)
                            }).then(r => r.json());
                        }

                        if (res.success) {
                            alert(isNew ? "Tạo hạng phòng mới thành công!" : "Lưu thay đổi thành công!");
                            if (isNew) {
                                activeRoomType.isNew = false;
                                await fetchRoomTypes();
                                return;
                            }
                        }
                    } catch (error) {
                        alert(isNew ? "Đã tạo mới hạng phòng! (Lưu cục bộ giao diện)" : "Lưu thay đổi thành công! (Lưu cục bộ giao diện)");
                        if (isNew) {
                            activeRoomType.isNew = false;
                        }
                    }

                    renderList();
                    selectRoomType(activeRoomType.id, true);
                });

                // Restore scroll position after rewriting HTML
                const newScrollArea = detailContainer.querySelector('.detail-scroll-area');
                if (newScrollArea) {
                    newScrollArea.scrollTop = savedScrollTop;
                }
            };

            // --- Remove Item/Amenity from Room Type ---
            window.removeItemFromRoomType = async (itemId) => {
                if (!activeRoomType) return;
                
                if (confirm("Bạn có chắc chắn muốn bỏ gán vật tư này?")) {
                    try {
                        const headers = { 'Authorization': 'Bearer ' + jwtToken };
                        const res = await fetch(`http://localhost:8080/api/admin/room-types/${activeRoomType.id}/items/${itemId}`, {
                            method: 'DELETE',
                            headers
                        }).then(r => r.json());

                        if (res.success) {
                            alert("Đã bỏ gán vật tư thành công!");
                        }
                    } catch (error) {
                        console.warn("Spring Boot Items API offline, unlinking item locally");
                    }

                    if (activeRoomType.items) {
                        activeRoomType.items = activeRoomType.items.filter(ci => ci.itemId !== itemId);
                    }
                    renderDetailForm();
                }
            };

            // --- Trigger Hidden File Input ---
            window.triggerImageUpload = () => {
                const fileInput = document.getElementById('image-file-input');
                if (fileInput) fileInput.click();
            };

            // --- Handle Image File Upload via Multipart Form Data ---
            window.handleImageUpload = async (event) => {
                if (!activeRoomType) return;
                const files = event.target.files;
                if (!files || files.length === 0) return;

                const formData = new FormData();
                for (let i = 0; i < files.length; i++) {
                    formData.append('files', files[i]);
                }

                try {
                    const headers = { 
                        'Authorization': 'Bearer ' + jwtToken
                    };
                    const res = await fetch(`http://localhost:8080/api/admin/room-types/${activeRoomType.id}/images`, {
                        method: 'POST',
                        headers,
                        body: formData
                    }).then(r => r.json());

                    if (res.success) {
                        alert("Tải ảnh lên thành công!");
                    }
                } catch (error) {
                    alert("Đã tải ảnh lên thành công! (Dữ liệu dự phòng)");
                }

                if (!activeRoomType.images) activeRoomType.images = [];
                for (let i = 0; i < files.length; i++) {
                    const fileUrl = URL.createObjectURL(files[i]);
                    activeRoomType.images.push({
                        id: Math.floor(Math.random() * 100000),
                        imageUrl: fileUrl,
                        isPrimary: activeRoomType.images.length === 0,
                        caption: files[i].name
                    });
                }
                
                renderDetailForm();
            };

            // --- Set Primary Image ---
            window.setPrimaryImage = async (imageId) => {
                if (!activeRoomType) return;

                try {
                    const headers = {
                        'Authorization': 'Bearer ' + jwtToken,
                        'Content-Type': 'application/json'
                    };
                    const body = {
                        isPrimary: true,
                        caption: "Primary Image"
                    };
                    const res = await fetch(`http://localhost:8080/api/admin/room-types/${activeRoomType.id}/images/${imageId}`, {
                        method: 'PUT',
                        headers,
                        body: JSON.stringify(body)
                    }).then(r => r.json());

                    if (res.success) {
                        alert("Đặt làm ảnh chính thành công!");
                    }
                } catch (error) {
                    console.warn("Spring Boot Images API offline, updating primary locally");
                }

                if (activeRoomType.images) {
                    activeRoomType.images.forEach(img => {
                        img.isPrimary = img.id === imageId;
                    });
                }

                renderDetailForm();
            };

            // --- Update Image Details (Caption & Primary Status) ---
            window.updateImageDetails = async (imageId) => {
                if (!activeRoomType) return;
                const captionInput = document.getElementById(`caption-input-${imageId}`);
                const primaryCheckbox = document.getElementById(`primary-checkbox-${imageId}`);
                if (!captionInput) return;

                const caption = captionInput.value.trim();
                const isPrimary = primaryCheckbox ? primaryCheckbox.checked : false;

                try {
                    const headers = {
                        'Authorization': 'Bearer ' + jwtToken,
                        'Content-Type': 'application/json'
                    };
                    const body = {
                        isPrimary,
                        caption
                    };
                    const res = await fetch(`http://localhost:8080/api/admin/room-types/${activeRoomType.id}/images/${imageId}`, {
                        method: 'PUT',
                        headers,
                        body: JSON.stringify(body)
                    }).then(r => r.json());

                    if (res.success) {
                        alert("Cập nhật thông tin ảnh thành công!");
                    }
                } catch (error) {
                    console.warn("Spring Boot Images API offline, updating primary locally");
                    alert("Cập nhật thông tin ảnh thành công! (Dữ liệu cục bộ)");
                }

                // Update locally
                if (activeRoomType.images) {
                    const target = activeRoomType.images.find(img => img.id === imageId);
                    if (target) {
                        target.caption = caption;
                        target.isPrimary = isPrimary;
                    }
                    if (isPrimary) {
                        activeRoomType.images.forEach(img => {
                            if (img.id !== imageId) img.isPrimary = false;
                        });
                    }
                }

                selectRoomType(activeRoomType.id, true);
            };

            // --- Toggle Primary Checkbox Interactively ---
            window.togglePrimaryCheckbox = (imageId) => {
                const currentCb = document.getElementById(`primary-checkbox-${imageId}`);
                if (currentCb && currentCb.checked) {
                    document.querySelectorAll('.checkbox-option input[type="checkbox"]').forEach(cb => {
                        const cbId = cb.id.replace('primary-checkbox-', '');
                        if (parseInt(cbId) !== imageId) {
                            cb.checked = false;
                            cb.disabled = false;
                        }
                    });
                }
            };

            // --- Delete Room Type Image ---
            window.deleteRoomTypeImage = async (imageId) => {
                if (!activeRoomType) return;

                if (confirm("Bạn có chắc chắn muốn xóa ảnh này?")) {
                    try {
                        const headers = { 'Authorization': 'Bearer ' + jwtToken };
                        const res = await fetch(`http://localhost:8080/api/admin/room-types/${activeRoomType.id}/images/${imageId}`, {
                            method: 'DELETE',
                            headers
                        }).then(r => r.json());

                        if (res.success) {
                            alert("Đã xóa ảnh thành công!");
                        }
                    } catch (error) {
                        console.warn("Spring Boot Images API offline, deleting locally");
                    }

                    if (activeRoomType.images) {
                        const wasPrimary = activeRoomType.images.find(img => img.id === imageId)?.isPrimary || false;
                        activeRoomType.images = activeRoomType.images.filter(img => img.id !== imageId);
                        
                        if (wasPrimary && activeRoomType.images.length > 0) {
                            activeRoomType.images[0].isPrimary = true;
                        }
                    }

                    renderDetailForm();
                }
            };

            // --- Add Room Type Action ---
            document.getElementById('btn-add-room-type').addEventListener('click', () => {
                if (allRoomTypes.some(rt => rt.isNew)) {
                    alert("Vui lòng hoàn tất việc tạo hạng phòng hiện tại trước!");
                    return;
                }

                const newId = allRoomTypes.length > 0 ? Math.max(...allRoomTypes.map(rt => rt.id)) + 1 : 1;
                const newType = {
                    id: newId,
                    isNew: true,
                    name: "Hạng phòng mới",
                    status: 1,
                    pricePerDay: 1000000,
                    pricePerHour: 100000,
                    targetDailyPercentage: 80,
                    targetHourlyPercentage: 20,
                    maxAdults: 2,
                    maxChildren: 0,
                    bedCount: 1,
                    bedType: "KING",
                    roomSizeM2: 25.0,
                    description: "Mô tả tóm tắt hạng phòng...",
                    images: [],
                    items: []
                };
                allRoomTypes.unshift(newType);
                renderList();
                selectRoomType(newId, true);
            });

            // --- Search and Filters handles ---
            document.getElementById('sidebar-search-name').addEventListener('input', (e) => {
                currentSearchQuery = e.target.value;
                renderList();
            });

            document.querySelectorAll('input[name="filter-status"]').forEach(r => {
                r.addEventListener('change', (e) => {
                    currentFilter = e.target.value;
                    renderList();
                });
            });

            // Trigger Load
            fetchBaseItems().then(() => {
                fetchRoomTypes();
            });
        });
    </script>
    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- CheckinX Style Unification & Smart Toast Alert Overrides -->
    <script>
        (function() {
            if (window.alertOverridden) return;
            window.alertOverridden = true;

            // 1. Tự động tiêm Google Font Outfit nếu chưa có
            if (!document.querySelector('link[href*="Outfit"]')) {
                const linkPreconnect1 = document.createElement('link');
                linkPreconnect1.rel = 'preconnect';
                linkPreconnect1.href = 'https://fonts.googleapis.com';
                document.head.appendChild(linkPreconnect1);

                const linkPreconnect2 = document.createElement('link');
                linkPreconnect2.rel = 'preconnect';
                linkPreconnect2.href = 'https://fonts.gstatic.com';
                linkPreconnect2.crossOrigin = 'anonymous';
                document.head.appendChild(linkPreconnect2);

                const linkFont = document.createElement('link');
                linkFont.rel = 'stylesheet';
                linkFont.href = 'https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap';
                document.head.appendChild(linkFont);
            }

            // 2. Ép font-family Outfit cho toàn bộ trang
            const styleElement = document.createElement('style');
            styleElement.id = 'checkinx-unified-styles';
            styleElement.innerHTML = `
                * {
                    font-family: 'Outfit', sans-serif !important;
                }
                #toast-container {
                    position: fixed;
                    top: 1rem;
                    right: 1rem;
                    z-index: 99999;
                    display: flex;
                    flex-col: column;
                    gap: 0.5rem;
                    pointer-events: none;
                }
                .toast-item {
                    pointer-events: auto;
                    animation: toastSlideIn 0.3s ease-out forwards;
                    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
                    transition: all 0.3s ease;
                }
                @keyframes toastSlideIn {
                    from { transform: translateX(120%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
            `;
            document.head.appendChild(styleElement);

            // 3. Tự động tiêm toast-container vào body
            function injectToastContainer() {
                if (!document.getElementById('toast-container')) {
                    const container = document.createElement('div');
                    container.id = 'toast-container';
                    container.className = 'flex flex-col gap-2';
                    document.body.appendChild(container);
                }
            }

            if (document.body) {
                injectToastContainer();
            } else {
                window.addEventListener('DOMContentLoaded', injectToastContainer);
            }

            // 4. Định nghĩa hàm showToast mượt mà cao cấp
            window.showToast = function(message, type = 'success') {
                const container = document.getElementById('toast-container');
                if (!container) return;

                const toast = document.createElement('div');
                
                let bgClass = 'text-emerald-800 border-emerald-100 bg-emerald-50/95 backdrop-blur-sm';
                let icon = '<i class="fa-solid fa-circle-check text-emerald-500 text-lg"></i>';
                
                if (type === 'info') {
                    bgClass = 'text-blue-800 border-blue-100 bg-blue-50/95 backdrop-blur-sm';
                    icon = '<i class="fa-solid fa-circle-info text-blue-500 text-lg"></i>';
                } else if (type === 'error') {
                    bgClass = 'text-red-800 border-red-100 bg-red-50/95 backdrop-blur-sm';
                    icon = '<i class="fa-solid fa-circle-xmark text-red-500 text-lg"></i>';
                } else if (type === 'warning') {
                    bgClass = 'text-amber-800 border-amber-100 bg-amber-50/95 backdrop-blur-sm';
                    icon = '<i class="fa-solid fa-triangle-exclamation text-amber-500 text-lg"></i>';
                }

                toast.className = `toast-item flex items-center gap-3 px-4 py-3 rounded-2xl border text-xs font-semibold bg-white ${bgClass}`;
                toast.innerHTML = `${icon} <span class="flex-1">${message}</span>`;
                
                container.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'scale(0.9) translateX(20px)';
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            };

            // 5. Ghi đè hàm alert() truyền thống
            window.alert = function(message) {
                if (!message) return;
                const msgStr = String(message);
                
                // Phân loại màu thông báo dựa trên từ khóa
                let type = 'info';
                const msgLower = msgStr.toLowerCase();
                if (msgLower.includes('thành công') || msgLower.includes('success') || msgLower.includes('hoàn tất') || msgLower.includes('đăng nhập thành công') || msgLower.includes('đăng ký thành công')) {
                    type = 'success';
                } else if (msgLower.includes('lỗi') || msgLower.includes('thất bại') || msgLower.includes('error') || msgLower.includes('hỏng') || msgLower.includes('không thể') || msgLower.includes('chưa') || msgLower.includes('không đúng') || msgLower.includes('không tìm thấy')) {
                    type = 'error';
                } else if (msgLower.includes('cảnh báo') || msgLower.includes('chú ý') || msgLower.includes('warning') || msgLower.includes('vui lòng') || msgLower.includes('yêu cầu') || msgLower.includes('hết hạn')) {
                    type = 'warning';
                }

                window.showToast(msgStr, type);
                console.log("CheckinX Smart Toast: Đã đánh chặn alert ->", msgStr);
            };
        })();
    </script>
